<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Produce Marketplace</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
      }

      /* Header */
      .header {
        background: #2e7d32;
        color: white;
        padding: 20px;
        text-align: center;
      }

      /* Hero Section */
      .hero {
        text-align: center;
        padding: 50px 20px;
      }

      .hero h1 {
        font-size: 36px;
        margin-bottom: 10px;
      }

      .hero p {
        font-size: 18px;
        color: #555;
      }

      /* Buttons */
      .buttons {
        margin-top: 30px;
      }

      .buttons a {
        text-decoration: none;
        padding: 12px 20px;
        margin: 10px;
        background: #2e7d32;
        color: white;
        border-radius: 5px;
        display: inline-block;
      }

      .buttons a:hover {
        background: #1b5e20;
      }

      /* Footer */
      .footer {
        background: #000;
        color: white;
        text-align: center;
        padding: 10px;
        position: fixed;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <!-- Header -->
    <div class="header">
      <h2>🌿 Local Produce Marketplace</h2>
    </div>

    <!-- Hero Section -->
    <div class="hero">
      <h1>Buy Fresh. Sell Local.</h1>
      <p>
        Connecting farmers and buyers directly for fresh agricultural products.
      </p>

      <div class="buttons">
        <a href="public/login.html">Login</a>
        <a href="public/register.html">Register</a>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>© 2026 Local Marketplace</p>
    </div>
  </body>
</html>
